schema: spec-driven

# Project context — 详见 openspec/project.md
context: |
  项目：家享收纳（home-storage）移动端 Web。
  目标前端栈：Vue 3 + TypeScript + Pinia + Element Plus + Tailwind CSS。
  分工：Element Plus 负责 UI 组件（表单/弹窗/按钮等）；Tailwind 负责布局与原子类样式。
  禁止：Reka UI、@/components/ui 脚手架、lucide-vue-next；勿用 Tailwind 替代 Element 组件。
  V1 纯前端：localStorage + IndexedDB，Repository 模式（repositories/local）。
  V2 规划：Spring Boot + MyBatis Plus + PostgreSQL，repositories/http。
  完整约定见 openspec/project.md。

